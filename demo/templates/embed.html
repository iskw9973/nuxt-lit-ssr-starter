<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手書き HTML への DSD 埋め込み</title>
    <!-- hydration support 入りバンドル。dist 配下に並ぶので相対パスで読む。 -->
    <script type="module" src="./wc.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0 auto; max-width: 760px; padding: 48px 24px 80px;
        font-family: system-ui, sans-serif; color: #1f2328; background: #f6f8fa;
      }
      h1 { font-size: 28px; margin: 0 0 4px; }
      .subtitle { color: #57606a; margin: 0 0 40px; }
      section { margin-top: 40px; }
      h2 { font-size: 18px; margin: 0 0 12px; }
      .note { margin-top: 8px; font-size: 13px; color: #57606a; }
      code { background: #eff1f3; padding: 1px 5px; border-radius: 4px; font-family: monospace; }
    </style>
  </head>
  <body>
    <!--
      これは「既存の手書き HTML テンプレート」を模したファイルです。
      dsd:〈名前〉 形式のマーカー位置に、ビルド時に DSD 断片が流し込まれます。
      原本（このファイル）は変更されず、生成結果は demo/dist/ に出力されます。
    -->
    <h1>手書き HTML への DSD 埋め込み</h1>
    <p class="subtitle">
      ページ自体は手書き。<code>&lt;!--dsd:card--&gt;</code> の位置に
      <code>@lit-labs/ssr</code> が生成した DSD 断片が注入されています。
    </p>

    <section>
      <h2>lit-card（DSD 注入）</h2>
      <!--dsd:card-->
    </section>

    <section>
      <h2>lit-counter（DSD 注入 + hydration）</h2>
      <!--dsd:counter-->
      <p class="note">初期値は DSD で描画済み。JS ロード後に hydration されて操作可能になります。</p>
    </section>
  </body>
</html>
